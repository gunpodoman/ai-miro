<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NEURAL-MAZE: Deep Learning Simulation</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg: #020617;
            --panel: #0f172a;
            --accent: #22d3ee;
            --wall: #1e293b;
            --gem: #fbbf24;
            --ai: #f472b6;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #cbd5e1;
            overflow: hidden;
        }

        .font-mono { font-family: 'JetBrains Mono', monospace; }

        /* 테크니컬 그리드 배경 */
        .grid-bg {
            background-image: radial-gradient(circle at 1px 1px, #1e293b 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* 미로 캔버스 스타일 */
        #maze-container {
            position: relative;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(34, 211, 238, 0.2);
        }

        .cell {
            transition: background-color 0.2s;
        }

        /* 글래스모피즘 패널 */
        .glass-panel {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* 커스텀 스크롤바 */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }

        /* 애니메이션 */
        @keyframes pulse-ai {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0.7); }
            70% { transform: scale(1.1); box-shadow: 0 0 0 10px rgba(244, 114, 182, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(244, 114, 182, 0); }
        }
        .ai-active { animation: pulse-ai 1s infinite; }

        @keyframes scanline {
            0% { top: -100%; }
            100% { top: 100%; }
        }
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(34, 211, 238, 0.1);
            animation: scanline 4s linear infinite;
        }
    </style>
</head>
<body class="grid-bg min-h-screen flex flex-col">

    <!-- 상단 상태바 -->
    <header class="h-16 border-b border-white/5 glass-panel flex items-center justify-between px-8 z-20">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-cyan-500/20 rounded flex items-center justify-center border border-cyan-500/40">
                <i data-lucide="brain-circuit" class="w-5 h-5 text-cyan-400"></i>
            </div>
            <div>
                <h1 class="text-sm font-bold tracking-widest text-white uppercase">Neural-Maze v1.0</h1>
                <p class="text-[10px] font-mono text-cyan-500/60 uppercase">Reinforcement Learning Simulation</p>
            </div>
        </div>
        
        <div class="flex items-center gap-8 font-mono text-[11px]">
            <div class="flex flex-col items-end">
                <span class="text-slate-500 uppercase">Learning Rate</span>
                <span id="stat-lr" class="text-cyan-400">0.10</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-slate-500 uppercase">Exploration (ε)</span>
                <span id="stat-epsilon" class="text-cyan-400">1.00</span>
            </div>
            <div class="flex flex-col items-end">
                <span class="text-slate-500 uppercase">Episodes</span>
                <span id="stat-episodes" class="text-cyan-400">0</span>
            </div>
        </div>
    </header>

    <!-- 메인 시뮬레이션 영역 -->
    <main class="flex-1 flex overflow-hidden">
        
        <!-- 왼쪽 사이드바: 컨트롤 -->
        <aside class="w-72 border-r border-white/5 glass-panel p-6 flex flex-col gap-8">
            <section>
                <h3 class="text-[10px] font-mono text-slate-500 uppercase mb-4 tracking-widest">Simulation Mode</h3>
                <div class="grid grid-cols-2 gap-2">
                    <button id="mode-train" class="px-3 py-2 rounded bg-cyan-500 text-slate-950 text-xs font-bold transition-all">TRAIN</button>
                    <button id="mode-build" class="px-3 py-2 rounded bg-slate-800 text-slate-400 text-xs font-bold hover:bg-slate-700 transition-all">BUILD</button>
                </div>
            </section>

            <section>
                <h3 class="text-[10px] font-mono text-slate-500 uppercase mb-4 tracking-widest">Environment</h3>
                <div class="flex flex-col gap-3">
                    <button id="btn-reset-maze" class="w-full py-2 border border-white/10 rounded text-xs hover:bg-white/5 transition-all flex items-center justify-center gap-2">
                        <i data-lucide="refresh-cw" class="w-3 h-3"></i> Generate New Maze
                    </button>
                    <button id="btn-clear-q" class="w-full py-2 border border-white/10 rounded text-xs hover:bg-white/5 transition-all flex items-center justify-center gap-2 text-rose-400 border-rose-500/20">
                        <i data-lucide="trash-2" class="w-3 h-3"></i> Reset AI Memory
                    </button>
                </div>
            </section>

            <section>
                <h3 class="text-[10px] font-mono text-slate-500 uppercase mb-4 tracking-widest">Speed Control</h3>
                <input id="speed-slider" type="range" min="1" max="100" value="50" class="w-full accent-cyan-500">
                <div class="flex justify-between text-[9px] font-mono mt-2 text-slate-600">
                    <span>SLOW</span>
                    <span>FAST</span>
                </div>
            </section>

            <section class="flex-1 overflow-hidden flex flex-col">
                <h3 class="text-[10px] font-mono text-slate-500 uppercase mb-4 tracking-widest">Neural Log</h3>
                <div id="log-container" class="flex-1 bg-black/40 rounded p-3 font-mono text-[10px] text-cyan-500/70 overflow-y-auto custom-scroll space-y-1">
                    <div>> System initialized.</div>
                    <div>> Waiting for training...</div>
                </div>
            </section>
        </aside>

        <!-- 중앙: 미로 캔버스 -->
        <section class="flex-1 relative flex items-center justify-center p-12">
            <div id="maze-container" class="bg-slate-900 rounded-lg overflow-hidden">
                <div class="scanline"></div>
                <canvas id="maze-canvas"></canvas>
            </div>

            <!-- 하단 툴팁 -->
            <div class="absolute bottom-8 left-1/2 -translate-x-1/2 glass-panel px-6 py-3 rounded-full flex items-center gap-6 text-[11px] font-mono">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-cyan-400 rounded-sm"></div>
                    <span>AI Agent</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-amber-400 rounded-sm"></div>
                    <span>Gem (Reward)</span>
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-emerald-500 rounded-sm"></div>
                    <span>Goal</span>
                </div>
                <div class="text-slate-500 ml-4">Click cell to place Gems / Toggle Walls</div>
            </div>
        </section>
    </main>

    <script>
        /**
         * NEURAL-MAZE ENGINE
         * Q-Learning 기반 미로 탈출 시뮬레이션
         */

        // --- 상수 및 설정 ---
        const GRID_SIZE = 15;
        const CELL_SIZE = 40;
        const ACTIONS = ['UP', 'RIGHT', 'DOWN', 'LEFT'];
        
        const REWARDS = {
            STEP: -1,
            WALL: -10,
            GEM: 100,
            GOAL: 500
        };

        let state = {
            mode: 'TRAIN', // TRAIN | BUILD
            maze: [],
            qTable: {},
            agent: { x: 1, y: 1 },
            goal: { x: GRID_SIZE - 2, y: GRID_SIZE - 2 },
            gems: [],
            episodes: 0,
            epsilon: 1.0,
            learningRate: 0.1,
            discountFactor: 0.9,
            speed: 50,
            isRunning: true
        };

        const canvas = document.getElementById('maze-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = GRID_SIZE * CELL_SIZE;
        canvas.height = GRID_SIZE * CELL_SIZE;

        // --- 미로 생성 (Recursive Backtracking) ---
        function generateMaze() {
            const maze = Array(GRID_SIZE).fill().map(() => Array(GRID_SIZE).fill(1));
            
            function walk(x, y) {
                maze[y][x] = 0;
                const dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]].sort(() => Math.random() - 0.5);
                
                for (let [dx, dy] of dirs) {
                    const nx = x + dx, ny = y + dy;
                    if (nx > 0 && nx < GRID_SIZE - 1 && ny > 0 && ny < GRID_SIZE - 1 && maze[ny][nx] === 1) {
                        maze[y + dy/2][x + dx/2] = 0;
                        walk(nx, ny);
                    }
                }
            }
            
            walk(1, 1);
            maze[state.goal.y][state.goal.x] = 0; // 출구 확보
            state.maze = maze;
            state.gems = [];
            resetAgent();
            log("New maze generated.");
        }

        // --- Q-Learning 핵심 로직 ---
        function getQ(x, y, action) {
            const key = `${x},${y}`;
            if (!state.qTable[key]) state.qTable[key] = { UP: 0, RIGHT: 0, DOWN: 0, LEFT: 0 };
            return state.qTable[key][action];
        }

        function setQ(x, y, action, value) {
            const key = `${x},${y}`;
            if (!state.qTable[key]) state.qTable[key] = { UP: 0, RIGHT: 0, DOWN: 0, LEFT: 0 };
            state.qTable[key][action] = value;
        }

        function chooseAction(x, y) {
            // Epsilon-Greedy 전략
            if (Math.random() < state.epsilon) {
                return ACTIONS[Math.floor(Math.random() * ACTIONS.length)];
            }
            
            const key = `${x},${y}`;
            const qValues = state.qTable[key] || { UP: 0, RIGHT: 0, DOWN: 0, LEFT: 0 };
            let maxVal = -Infinity;
            let bestActions = [];
            
            for (let action of ACTIONS) {
                if (qValues[action] > maxVal) {
                    maxVal = qValues[action];
                    bestActions = [action];
                } else if (qValues[action] === maxVal) {
                    bestActions.push(action);
                }
            }
            return bestActions[Math.floor(Math.random() * bestActions.length)];
        }

        function updateAgent() {
            if (state.mode !== 'TRAIN' || !state.isRunning) return;

            const { x, y } = state.agent;
            const action = chooseAction(x, y);
            
            let nx = x, ny = y;
            if (action === 'UP') ny--;
            if (action === 'DOWN') ny++;
            if (action === 'LEFT') nx--;
            if (action === 'RIGHT') nx++;

            let reward = REWARDS.STEP;
            let hitWall = false;

            // 경계 및 벽 체크
            if (nx < 0 || nx >= GRID_SIZE || ny < 0 || ny >= GRID_SIZE || state.maze[ny][nx] === 1) {
                reward = REWARDS.WALL;
                nx = x; ny = y; // 제자리
                hitWall = true;
            } else if (nx === state.goal.x && ny === state.goal.y) {
                reward = REWARDS.GOAL;
            } else {
                // 보석 체크
                const gemIdx = state.gems.findIndex(g => g.x === nx && g.y === ny);
                if (gemIdx > -1) {
                    reward = REWARDS.GEM;
                    state.gems.splice(gemIdx, 1); // 보석 획득
                    log(`AI found a GEM at [${nx}, ${ny}]! Reward +100`);
                }
            }

            // Q-Value 업데이트 (Bellman Equation)
            const oldQ = getQ(x, y, action);
            const nextMaxQ = Math.max(...Object.values(state.qTable[`${nx},${ny}`] || { UP: 0, RIGHT: 0, DOWN: 0, LEFT: 0 }));
            const newQ = oldQ + state.learningRate * (reward + state.discountFactor * nextMaxQ - oldQ);
            setQ(x, y, action, newQ);

            state.agent = { x: nx, y: ny };

            // 에피소드 종료 체크
            if (reward === REWARDS.GOAL) {
                state.episodes++;
                state.epsilon = Math.max(0.01, state.epsilon * 0.99); // 점차 탐험 감소
                resetAgent();
                log(`Episode ${state.episodes} complete. Goal reached!`);
                updateStats();
            }
        }

        function resetAgent() {
            state.agent = { x: 1, y: 1 };
        }

        // --- 렌더링 ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            for (let y = 0; y < GRID_SIZE; y++) {
                for (let x = 0; x < GRID_SIZE; x++) {
                    const px = x * CELL_SIZE;
                    const py = y * CELL_SIZE;

                    // 벽/길 그리기
                    if (state.maze[y][x] === 1) {
                        ctx.fillStyle = '#1e293b';
                        ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                    } else {
                        // Q-Value 시각화 (학습된 정도를 배경색으로)
                        const qValues = state.qTable[`${x},${y}`];
                        if (qValues) {
                            const maxQ = Math.max(...Object.values(qValues));
                            if (maxQ > 0) {
                                ctx.fillStyle = `rgba(34, 211, 238, ${Math.min(0.3, maxQ / 500)})`;
                                ctx.fillRect(px, py, CELL_SIZE, CELL_SIZE);
                            }
                        }
                    }

                    // 그리드 선
                    ctx.strokeStyle = 'rgba(255,255,255,0.02)';
                    ctx.strokeRect(px, py, CELL_SIZE, CELL_SIZE);
                }
            }

            // 보석 그리기
            state.gems.forEach(gem => {
                ctx.fillStyle = '#fbbf24';
                ctx.beginPath();
                ctx.arc(gem.x * CELL_SIZE + CELL_SIZE/2, gem.y * CELL_SIZE + CELL_SIZE/2, 6, 0, Math.PI * 2);
                ctx.fill();
                // 광채 효과
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#fbbf24';
                ctx.stroke();
                ctx.shadowBlur = 0;
            });

            // 목표 지점
            ctx.fillStyle = '#10b981';
            ctx.fillRect(state.goal.x * CELL_SIZE + 4, state.goal.y * CELL_SIZE + 4, CELL_SIZE - 8, CELL_SIZE - 8);

            // AI 에이전트
            const ax = state.agent.x * CELL_SIZE + CELL_SIZE/2;
            const ay = state.agent.y * CELL_SIZE + CELL_SIZE/2;
            ctx.fillStyle = '#f472b6';
            ctx.beginPath();
            ctx.arc(ax, ay, 10, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f472b6';
            ctx.stroke();
            ctx.shadowBlur = 0;

            requestAnimationFrame(draw);
        }

        // --- 유틸리티 ---
        function log(msg) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            div.textContent = `> ${msg}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
        }

        function updateStats() {
            document.getElementById('stat-lr').textContent = state.learningRate.toFixed(2);
            document.getElementById('stat-epsilon').textContent = state.epsilon.toFixed(2);
            document.getElementById('stat-episodes').textContent = state.episodes;
        }

        // --- 이벤트 리스너 ---
        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = Math.floor((e.clientX - rect.left) / CELL_SIZE);
            const y = Math.floor((e.clientY - rect.top) / CELL_SIZE);

            if (x < 0 || x >= GRID_SIZE || y < 0 || y >= GRID_SIZE) return;

            if (state.mode === 'BUILD') {
                if ((x === 1 && y === 1) || (x === state.goal.x && y === state.goal.y)) return;
                state.maze[y][x] = state.maze[y][x] === 1 ? 0 : 1;
                log(`Wall toggled at [${x}, ${y}]`);
            } else {
                if (state.maze[y][x] === 0) {
                    state.gems.push({ x, y });
                    log(`Gem placed at [${x}, ${y}]. AI will be attracted here.`);
                }
            }
        });

        document.getElementById('mode-train').onclick = () => {
            state.mode = 'TRAIN';
            document.getElementById('mode-train').className = "px-3 py-2 rounded bg-cyan-500 text-slate-950 text-xs font-bold transition-all";
            document.getElementById('mode-build').className = "px-3 py-2 rounded bg-slate-800 text-slate-400 text-xs font-bold hover:bg-slate-700 transition-all";
            log("Mode switched to TRAINING.");
        };

        document.getElementById('mode-build').onclick = () => {
            state.mode = 'BUILD';
            document.getElementById('mode-build').className = "px-3 py-2 rounded bg-cyan-500 text-slate-950 text-xs font-bold transition-all";
            document.getElementById('mode-train').className = "px-3 py-2 rounded bg-slate-800 text-slate-400 text-xs font-bold hover:bg-slate-700 transition-all";
            log("Mode switched to BUILD. Click cells to toggle walls.");
        };

        document.getElementById('btn-reset-maze').onclick = () => generateMaze();
        document.getElementById('btn-clear-q').onclick = () => {
            state.qTable = {};
            state.episodes = 0;
            state.epsilon = 1.0;
            updateStats();
            log("AI memory wiped. Starting from scratch.");
        };

        document.getElementById('speed-slider').oninput = (e) => {
            state.speed = e.target.value;
        };

        // --- 메인 루프 ---
        function mainLoop() {
            updateAgent();
            // 속도 조절을 위한 타임아웃
            const delay = 101 - state.speed;
            setTimeout(mainLoop, delay);
        }

        // 초기화
        lucide.createIcons();
        generateMaze();
        draw();
        mainLoop();

    </script>
</body>
</html>
